<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Teacher — Expose Slots</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body class="calendar-layout">
    <main>
      <h1>Teacher — Expose Time Slots to Students</h1>
      <p class="hint">Select which available slots should be visible to students.</p>
      <div id="teacher-controls" style="margin-bottom:12px;display:flex;gap:8px;align-items:center;flex-wrap:wrap">
        <label>Days to show <input id="days" type="number" value="14" min="1" max="90" style="width:80px"></label>
        <label>Timezone: <select id="tz-select" style="min-width:220px"></select></label>
        <p id="tz" style="margin:0;color:#555"></p>
        <label>View: 
          <select id="view-select">
            <option value="week">Week</option>
            <option value="3day">3-Day</option>
            <option value="month">Month</option>
          </select>
        </label>
        <div id="view-nav" style="display:flex; gap:8px; align-items:center">
          <button id="prev-view" type="button">Prev</button>
          <span id="view-label"></span>
          <button id="next-view" type="button">Next</button>
        </div>
        <button id="refresh">Refresh</button>
        <button id="select-all-displayed">Select All Displayed</button>
        <button id="clear-selection">Clear Selection</button>
        <button id="save">Save Exposed Slots</button>
        <button id="logout" class="btn-secondary" style="margin-left:8px">Logout</button>
        <span id="status" style="margin-left:8px;color:#333"></span>
      </div>
      <div id="slots-list" class="calendar-grid"></div>
      <p><a href="/">Back to student view</a></p>
    </main>
    <script src="/teacher.js"></script>
  </body>
</html>
